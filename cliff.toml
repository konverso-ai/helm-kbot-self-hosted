[remote.github]
owner = "konverso-ai"
repo = "helm-kbot-self-hosted"

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="kbot-self-hosted-") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif %}\
            {% if commit.remote.pr_number %} in \
                [#{{ commit.remote.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ commit.remote.pr_number }})\
            {%- endif %}\
    {% endfor %}
{% endfor %}

{%- if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
    ### New Contributors
    {%- for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
        {%- if contributor.pr_number %}
        * @{{ contributor.username }} made their first contribution in \
            [#{{ contributor.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ contributor.pr_number }})
        {%- else %}
        * @{{ contributor.username }} made their first contribution
        {%- endif %}
    {%- endfor %}
{%- endif %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = "\\[skip ci\\]", skip = true },
    { message = "^fix\\(deps\\)", group = "Dependencies" },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^chore\\(KB-21705\\)", group = "Dependencies" },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^doc", group = "Documentation" },
    { message = "^ci", group = "CI/CD" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^style", group = "Styling" },
    { body = ".*security", group = "Security" },
    { message = "^[A-Z]+-\\d+", group = "Miscellaneous" },
    { message = ".*", group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "kbot-self-hosted-[0-9].*"
topo_order = false
sort_commits = "newest"
