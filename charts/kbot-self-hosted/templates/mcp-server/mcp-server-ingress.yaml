{{- if and .Values.mcpServer.enabled .Values.mcpServer.ingress.enabled }}
{{- $hostname := .Values.mcpServer.ingress.hostname | default "" -}}
{{- if $hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: mcp-server
    {{- with .Values.mcpServer.ingress.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.mcpServer.ingress.annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ tpl (toString $value) $ | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- with .Values.mcpServer.ingress.ingressClassName }}
  ingressClassName: {{ tpl . $ }}
  {{- end }}
  rules:
    - host: {{ tpl $hostname $ | quote }}
      http:
        paths:
          - path: {{ .Values.mcpServer.ingress.path | default "/" | quote }}
            pathType: {{ .Values.mcpServer.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: mcp-server
                port:
                  name: apirest
  tls:
    - hosts:
      - {{ tpl $hostname $ }}
      secretName: {{ .Values.mcpServer.ingress.tls.secretName | default "tls-mcp-server-prod-cert" }}
{{- end }}
{{- end }}
