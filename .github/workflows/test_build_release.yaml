name: Test Build Release
run-name: "${{github.ref_name}} -- Test Build Release"

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, edited, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref || github.run_id }}
  cancel-in-progress: false

env:
  ACR_REGISTRY_URL: konversoai.azurecr.io
  CHART_NAME: kbot-self-hosted
  CHART_PATH: charts/kbot-self-hosted/Chart.yaml

jobs:
  pre-test:
    name: Pre Test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm Chart
        working-directory: charts/kbot-self-hosted
        run: helm lint .

      - name: Test Helm Chart Template
        working-directory: charts/kbot-self-hosted
        run: helm template test-release . --dry-run

      - name: Package Helm Chart (Test)
        working-directory: charts/kbot-self-hosted
        run: helm package . --destination ./packages

  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          TAG_PREFIX="${{ env.CHART_NAME }}-"
          CHART_VER=$(grep '^version:' "${{ env.CHART_PATH }}" | awk '{print $2}')
          LAST_TAG=$(git tag --list "${TAG_PREFIX}*" --sort=-v:refname | head -n 1 || true)

          if [ -z "$LAST_TAG" ]; then
            echo "version=${CHART_VER}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG_PREFIX}${CHART_VER}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_VER="${LAST_TAG#${TAG_PREFIX}}"
          COMMITS_SINCE=$(git rev-list --count "${LAST_TAG}..HEAD" 2>/dev/null || echo "0")

          if [ "$COMMITS_SINCE" -eq 0 ]; then
            echo "version=${CHART_VER}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG_PREFIX}${CHART_VER}" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HIGHEST=$(printf '%s\n%s\n' "$CHART_VER" "$LAST_VER" | sort -V | tail -n 1)
          if [ "$HIGHEST" = "$LAST_VER" ]; then
            MAJOR=$(echo "$LAST_VER" | cut -d. -f1)
            MINOR=$(echo "$LAST_VER" | cut -d. -f2)
            PATCH=$(echo "$LAST_VER" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            VERSION="$CHART_VER"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_PREFIX}${VERSION}" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  build-push-helm:
    name: Build and push Helm Chart
    runs-on: ubuntu-latest
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.should_release == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_PAT }}

      - name: Bump Chart.yaml when auto-incrementing
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          CHART_VER=$(grep '^version:' "${{ env.CHART_PATH }}" | awk '{print $2}')
          if [ "$CHART_VER" != "$VERSION" ]; then
            sed -i "s/^version:.*/version: ${VERSION}/" "${{ env.CHART_PATH }}"
            git config user.name "konversoai"
            git config user.email "73905580+konversoai@users.noreply.github.com"
            git add "${{ env.CHART_PATH }}"
            git commit -m "chore(INFRA-123): bump chart version to ${VERSION}"
          fi

      - name: Push chart version to main
        run: |
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push origin HEAD:main
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add dependency chart repos
        run: helm repo add wiremind https://wiremind.github.io/wiremind-helm-charts

      - name: Set chart package metadata
        run: |
          echo "CHART_VERSION=${{ needs.prepare-release.outputs.version }}" >> "$GITHUB_ENV"
          echo "CHART_FILE=${{ env.CHART_NAME }}-${{ needs.prepare-release.outputs.version }}.tgz" >> "$GITHUB_ENV"

      - name: Configure Git
        run: git config --global user.email "73905580+konversoai@users.noreply.github.com" && git config --global user.name "konversoai"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GH_PAT }}"
        with:
          skip_existing: true

      - name: Authenticate to Helm Registry
        run: |
          helm registry login ${{ env.ACR_REGISTRY_URL }} \
            --username github-runner-helm-chart \
            --password ${{ secrets.HELM_ACR_TOKEN }}

      - name: Package Helm Chart
        working-directory: charts/kbot-self-hosted
        run: helm package . --destination ./packages

      - name: Push Helm Chart to ACR
        run: helm push charts/kbot-self-hosted/packages/${{ env.CHART_FILE }} oci://${{ env.ACR_REGISTRY_URL }}/helm

  release-changelog:
    name: Update release changelog
    runs-on: ubuntu-latest
    needs: [prepare-release, build-push-helm]
    if: ${{ needs.prepare-release.outputs.should_release == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Install git-cliff
        run: |
          CLIFF_VERSION=$(curl -s https://api.github.com/repos/orhun/git-cliff/releases/latest | jq -r '.tag_name')
          curl -sSfL "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Generate changelog for release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: git-cliff --config cliff.toml --unreleased --tag "${TAG}" --output CHANGES.md

      - name: Update GitHub Release notes
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" \
              --title "${VERSION}" \
              --notes-file CHANGES.md \
              --target main
          else
            gh release edit "$TAG" --notes-file CHANGES.md
          fi
